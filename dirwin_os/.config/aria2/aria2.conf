# ========================================
# aria2c – XDG-compliant config
# ========================================

# ---- Basic ----
dir=${HOME}/Downloads/aria2/dow
input-file=${HOME}/Downloads/aria2/queue.txt
save-session=${HOME}/Downloads/aria2/session
log=${HOME}/.cache/aria2/aria2.log
listen-port=60000-60010
max-concurrent-downloads=10
seed-ratio=1.0
enable-rpc=true
rpc-secret=${ARIA2_SECRET}


# Default (fast + safe on modern Linux)
file-allocation=falloc

# Uncomment below if on NFS, tmpfs, or want max speed
# file-allocation=none
