# ======================================================
# aria2c – Advanced Configuration File
# https://man.archlinux.org/man/aria2c.1#OPTIONS
# https://man.archlinux.org/man/aria2c.1#Console_Readout
# https://man.archlinux.org/man/aria2c.1#on
# ======================================================


# Basic Setup =-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-
# Run as a background daemon process.
# daemon=true

# Set the directory for all downloaded files.
dir=${HOME}/Downloads/aria2/dow

# Set the main log file path.
log=${HOME}/.cache/aria2/aria2.log

# Set the log level. 'info' is a good balance. 'debug' is very verbose.
log-level=info
# =-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-

# Download & Session Management =-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-
# Continue downloading a partially downloaded file.
continue=true

# Use a session file to save and restore downloads on restart.
save-session=${HOME}/Downloads/aria2/.session.txt

# Save session data every 60 seconds to prevent data loss on crash.
save-session-interval=60

# Always save session, even for completed/seeding torrents.
force-save=true

# Read a list of URLs/torrents to download from this file on startup.
# You can add some command line options to the session file. After your link, it should separated with tab character or a single space eg. "<URL> --log "
input-file=${HOME}/Downloads/aria2/queue.txt

# Path to the cookie file for downloading from sites that require login.
save-cookies=${HOME}/Downloads/aria2/.cookies.txt

# Pre-allocate file space quickly. (Best for modern filesystems like ext4, APFS, NTFS)
file-allocation=falloc
# file-allocation=none
# =-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-

# Performance & Network Tuning =-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=
# Maximum number of concurrent downloads.
max-concurrent-downloads=16

# Max connections to a single server for one download.
max-connection-per-server=16

# Split a file into this many connections. Works with the option above.
split=16

# Don't split files smaller than this. Prevents wasting connections on tiny files.
min-split-size=20M

# Cache data in memory to reduce disk I/O and improve performance.
disk-cache=150M

# Set connect timeout in seconds.
#connect-timeout=60

# Set total timeout in seconds.
#timeout=60

# Overall download speed limit. 0 is unlimited. (e.g., 50M for 50MB/s)
#max-overall-download-limit=0

# Overall upload speed limit. Crucial for not choking your connection.
#max-overall-upload-limit=10M
# =-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-

# BitTorrent Specifics =-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=
# Stop seeding immediately after download is complete.
seed-time=0
seed-ratio=0.0

# Do not automatically start downloads from .torrent files.
#follow-torrent=false

# Set the TCP/UDP ports for BitTorrent. Forward these ports on your router for best performance.
#listen-port=6881-6999
#dht-listen-port=6881-6999

# Enable Local Peer Discovery for finding peers on your local network.
bt-enable-lpd=true

# Maximum number of peers per torrent.
bt-max-peers=10
# If torrent speed is below this, aria2 will try to find more peers.
#bt-request-peer-speed-limit=100K

# Automatically remove .!aria2 files for unselected files in a torrent.
bt-remove-unselected-file=true
remove-control-file=true

# Require encryption for peer connections to help avoid ISP throttling.
#bt-force-encryption=true

# Spoof a common BitTorrent client ID. Can improve compatibility. (e.g., qBittorrent)
peer-id-prefix=-qB4330-

#user-agent="qBittorrent/4.3.3"
user-agent="qBittorrent"
#user-agent="youMom"

# Add a list of public trackers. This will significantly improve peer discovery for public torrents.
# To use, uncomment the line below and remove the # from the beginning of each tracker URL.
# bt-tracker=\
# udp://tracker.opentrackr.org:1337/announce,
# udp://tracker.openbittorrent.com:6969/announce,
# udp://open.demonii.com:1337/announce,
# udp://tracker.internetwarriors.net:1337/announce,
# udp://tracker.leechers-paradise.org:6969/announce
# =-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-

# Event Hooks =-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-
# Run a script when a torrent download finishes (but before seeding starts).
# Replace the path with the actual path to your script.
#on-bt-download-complete=<|/path/to/your/script.sh|>
#on-download-complete={HOME}/.config/aria2/script/
on-download-complete={HOME}/.config/aria2/script/write_history.sh
# =-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-

# RPC Interface (for GUIs like AriaNg) =-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=
#enable-rpc=true
#rpc-listen-all=true
# IMPORTANT: Set a secret token for security!
rpc-secret=${ARIA2C_SESSION_TOKEN}

# Add new downloads in a paused state. You must start them from your GUI.
#pause=true
# =-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-

# Console Readout (for when not in daemon mode) =-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-
# Update the status line every 1 second.
#summary-interval=1

# Use human-readable units (KiB, MiB).
human-readable=true

# Show a more detailed summary when a download finishes.
download-result=full
# =-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-
